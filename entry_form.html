<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易思合道作业纸 - 网页录入表单</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 40px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 8px; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        .section { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .section-title { font-weight: bold; font-size: 1.1em; margin-bottom: 15px; color: #444; }
        .input-group { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 10px; }
        .field { display: flex; align-items: center; gap: 5px; }
        input[type="text"], input[type="date"], select { border: none; border-bottom: 1px solid #999; padding: 5px; outline: none; background: #fcfcfc; }
        input[type="text"]:focus { border-bottom: 2px solid #007bff; background: #fff; }
        
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background: #f9f9f9; }
        td input { width: 90%; border: none; text-align: center; outline: none; }
        
        .row-inputs { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .full-width-input { flex: 1; border: none; border-bottom: 1px solid #999; padding: 5px; }
        
        textarea { width: 100%; height: 100px; border: 1px solid #ccc; border-radius: 4px; padding: 10px; resize: vertical; margin-top: 10px; }
        
        .actions { display: flex; justify-content: center; gap: 20px; margin-top: 40px; }
        .btn { padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; transition: background 0.3s; }
        .btn-save { background-color: #28a745; color: white; }
        .btn-save:hover { background-color: #218838; }
        .btn-clear { background-color: #6c757d; color: white; }
        .btn-clear:hover { background-color: #5a6268; }
        
        .hint { font-size: 0.8em; color: #888; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>易思合道作业纸</h1>
    
    <form id="entryForm">
        <!-- 基本信息 -->
        <div class="section">
            <div class="input-group">
                <div class="field">姓名：<input type="text" id="name" required></div>
                <div class="field">
                    生辰：
                    <input type="text" id="year" style="width: 50px;">年
                    <input type="text" id="month" style="width: 30px;">月
                    <input type="text" id="day" style="width: 30px;">日
                    <input type="text" id="hour" style="width: 30px;">时
                </div>
                <div class="field">
                    <select id="gender">
                        <option value="乾">乾（男）</option>
                        <option value="坤">坤（女）</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 命盘 Table -->
        <div class="section">
            <div class="section-title">命盘</div>
            <table>
                <tr>
                    <th></th>
                    <th>年</th>
                    <th>月</th>
                    <th>日</th>
                    <th>时</th>
                </tr>
                <tr>
                    <td>天干</td>
                    <td><input type="text" id="ming_tg_year"></td>
                    <td><input type="text" id="ming_tg_month"></td>
                    <td><input type="text" id="ming_tg_day"></td>
                    <td><input type="text" id="ming_tg_hour"></td>
                </tr>
                <tr>
                    <td>地支</td>
                    <td><input type="text" id="ming_dz_year"></td>
                    <td><input type="text" id="ming_dz_month"></td>
                    <td><input type="text" id="ming_dz_day"></td>
                    <td><input type="text" id="ming_dz_hour"></td>
                </tr>
            </table>
        </div>

        <!-- 大运 Table -->
        <div class="section">
            <div class="section-title">大运</div>
            <table>
                <tr>
                    <td>岁数</td>
                    <td><input type="text" id="dy_age_1"></td>
                    <td><input type="text" id="dy_age_2"></td>
                    <td><input type="text" id="dy_age_3"></td>
                    <td><input type="text" id="dy_age_4"></td>
                    <td><input type="text" id="dy_age_5"></td>
                    <td><input type="text" id="dy_age_6"></td>
                    <td><input type="text" id="dy_age_7"></td>
                    <td><input type="text" id="dy_age_8"></td>
                </tr>
                <tr>
                    <td>天干</td>
                    <td><input type="text" id="dy_tg_1"></td>
                    <td><input type="text" id="dy_tg_2"></td>
                    <td><input type="text" id="dy_tg_3"></td>
                    <td><input type="text" id="dy_tg_4"></td>
                    <td><input type="text" id="dy_tg_5"></td>
                    <td><input type="text" id="dy_tg_6"></td>
                    <td><input type="text" id="dy_tg_7"></td>
                    <td><input type="text" id="dy_tg_8"></td>
                </tr>
                <tr>
                    <td>地支</td>
                    <td><input type="text" id="dy_dz_1"></td>
                    <td><input type="text" id="dy_dz_2"></td>
                    <td><input type="text" id="dy_dz_3"></td>
                    <td><input type="text" id="dy_dz_4"></td>
                    <td><input type="text" id="dy_dz_5"></td>
                    <td><input type="text" id="dy_dz_6"></td>
                    <td><input type="text" id="dy_dz_7"></td>
                    <td><input type="text" id="dy_dz_8"></td>
                </tr>
            </table>
        </div>

        <!-- 定格局 -->
        <div class="section">
            <div class="section-title">一、定格局</div>
            <div class="row-inputs">
                <input type="text" id="gj_base" style="width: 80px;">生于
                <input type="text" id="gj_month" style="width: 50px;">月季节
                <input type="text" id="gj_season" style="width: 80px;">
            </div>
            <div class="row-inputs">1、强/弱：<input type="text" id="gj_strength" style="width: 100px;"> 何种局 <input type="text" id="gj_type" class="full-width-input"></div>
            <div class="row-inputs">2、根：<input type="text" id="gj_root" class="full-width-input"></div>
            <div class="row-inputs">3、扶抑/从：<input type="text" id="gj_follow" style="width: 100px;"> 局</div>
            <div class="row-inputs">画像：<input type="text" id="gj_portrait" class="full-width-input"></div>
            <div class="row-inputs">天赋本能：<input type="text" id="gj_talent" class="full-width-input"></div>
        </div>

        <!-- 定寒燥 -->
        <div class="section">
            <div class="section-title">二、定寒燥</div>
            <div class="row-inputs">
                <input type="text" id="hz_base" style="width: 120px;">
                调候药：<input type="text" id="hz_medicine" style="width: 100px;">
                有/无：<input type="text" id="hz_exists" style="width: 80px;">
            </div>
            <div class="row-inputs">
                意识：喜 <input type="text" id="hz_like" class="full-width-input">
                不喜 <input type="text" id="hz_dislike" class="full-width-input">
            </div>
        </div>

        <!-- 定病药 Table -->
        <div class="section">
            <div class="section-title">三、定病药</div>
            <table>
                <tr>
                    <th>级别</th>
                    <th>五行</th>
                    <th>五识</th>
                    <th>有/无</th>
                    <th>旺/相</th>
                    <th>根有/无</th>
                    <th>强/弱</th>
                    <th>意识</th>
                </tr>
                <tr>
                    <td>君</td>
                    <td><input type="text" id="by_jun_wx"></td>
                    <td><input type="text" id="by_jun_ws"></td>
                    <td><input type="text" id="by_jun_exists"></td>
                    <td><input type="text" id="by_jun_status"></td>
                    <td><input type="text" id="by_jun_root"></td>
                    <td><input type="text" id="by_jun_str"></td>
                    <td><input type="text" id="by_jun_mind"></td>
                </tr>
                <tr>
                    <td>臣</td>
                    <td><input type="text" id="by_chen_wx"></td>
                    <td><input type="text" id="by_chen_ws"></td>
                    <td><input type="text" id="by_chen_exists"></td>
                    <td><input type="text" id="by_chen_status"></td>
                    <td><input type="text" id="by_chen_root"></td>
                    <td><input type="text" id="by_chen_str"></td>
                    <td><input type="text" id="by_chen_mind"></td>
                </tr>
                <tr>
                    <td>次</td>
                    <td><input type="text" id="by_ci_wx"></td>
                    <td><input type="text" id="by_ci_ws"></td>
                    <td><input type="text" id="by_ci_exists"></td>
                    <td><input type="text" id="by_ci_status"></td>
                    <td><input type="text" id="by_ci_root"></td>
                    <td><input type="text" id="by_ci_str"></td>
                    <td><input type="text" id="by_ci_mind"></td>
                </tr>
            </table>
        </div>

        <!-- 定流动 -->
        <div class="section">
            <div class="section-title">四、定流动</div>
            <div class="row-inputs">
                断点：<input type="text" id="ld_break" style="width: 150px;">
                暗旺是病/药：<input type="text" id="ld_hidden" style="width: 150px;">
                意识：<input type="text" id="ld_mind" class="full-width-input">
            </div>
        </div>

        <!-- 看大运 -->
        <div class="section">
            <div class="section-title">五、看大运</div>
            <div id="dayun_list">
                <div class="row-inputs">
                    <input type="text" style="width: 60px;">大运 
                    失/平衡<input type="text" style="width: 40px;"> 
                    意识变化：<input type="text" class="full-width-input">
                </div>
                <div class="row-inputs">
                    <input type="text" style="width: 60px;">大运 
                    失/平衡<input type="text" style="width: 40px;"> 
                    意识：<input type="text" class="full-width-input">
                </div>
                <div class="row-inputs">
                    <input type="text" style="width: 60px;">大运 
                    失/平衡<input type="text" style="width: 40px;"> 
                    意识：<input type="text" class="full-width-input">
                </div>
                <div class="row-inputs">
                    <input type="text" style="width: 60px;">大运 
                    失/平衡<input type="text" style="width: 40px;"> 
                    意识：<input type="text" class="full-width-input">
                </div>
            </div>
        </div>

        <!-- 和我的异同 -->
        <div class="section">
            <div class="section-title">六、和我的异同</div>
            <textarea id="my_diff"></textarea>
        </div>

        <div class="actions">
            <button type="button" class="btn btn-save" onclick="saveMarkdown()">保存为 Markdown</button>
            <button type="reset" class="btn btn-clear">重置表单</button>
        </div>
        <p class="hint">数据将保存至您的下载文件夹，您可以将其移动至 AI 知识库目录。</p>
    </form>
</div>

<script>
    function saveMarkdown() {
        const name = document.getElementById('name').value || '未命名';
        const dateStr = new Date().toISOString().split('T')[0];
        
        let md = `# 易思合道作业纸 - ${name}\n\n`;
        md += `## 基本信息\n`;
        md += `- **姓名**: ${name}\n`;
        md += `- **生辰**: ${document.getElementById('year').value}年${document.getElementById('month').value}月${document.getElementById('day').value}日 ${document.getElementById('hour').value}时\n`;
        md += `- **性别**: ${document.getElementById('gender').value}\n\n`;

        // 命盘
        md += `## 命盘\n`;
        md += `| 柱 | 年 | 月 | 日 | 时 |\n`;
        md += `| :--- | :--- | :--- | :--- | :--- |\n`;
        md += `| 天干 | ${document.getElementById('ming_tg_year').value} | ${document.getElementById('ming_tg_month').value} | ${document.getElementById('ming_tg_day').value} | ${document.getElementById('ming_tg_hour').value} |\n`;
        md += `| 地支 | ${document.getElementById('ming_dz_year').value} | ${document.getElementById('ming_dz_month').value} | ${document.getElementById('ming_dz_day').value} | ${document.getElementById('ming_dz_hour').value} |\n\n`;

        // 大运表
        md += `## 大运排列\n`;
        md += `| 运数 | 1 | 2 | 3 | 4 | 5 | 6 | 7 | 8 |\n`;
        md += `| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n`;
        md += `| 岁数 | ${document.getElementById('dy_age_1').value} | ${document.getElementById('dy_age_2').value} | ${document.getElementById('dy_age_3').value} | ${document.getElementById('dy_age_4').value} | ${document.getElementById('dy_age_5').value} | ${document.getElementById('dy_age_6').value} | ${document.getElementById('dy_age_7').value} | ${document.getElementById('dy_age_8').value} |\n`;
        md += `| 天干 | ${document.getElementById('dy_tg_1').value} | ${document.getElementById('dy_tg_2').value} | ${document.getElementById('dy_tg_3').value} | ${document.getElementById('dy_tg_4').value} | ${document.getElementById('dy_tg_5').value} | ${document.getElementById('dy_tg_6').value} | ${document.getElementById('dy_tg_7').value} | ${document.getElementById('dy_tg_8').value} |\n`;
        md += `| 地支 | ${document.getElementById('dy_dz_1').value} | ${document.getElementById('dy_dz_2').value} | ${document.getElementById('dy_dz_3').value} | ${document.getElementById('dy_dz_4').value} | ${document.getElementById('dy_dz_5').value} | ${document.getElementById('dy_dz_6').value} | ${document.getElementById('dy_dz_7').value} | ${document.getElementById('dy_dz_8').value} |\n\n`;

        // 定格局
        md += `## 一、定格局\n`;
        md += `- **基础**: ${document.getElementById('gj_base').value} 生于 ${document.getElementById('gj_month').value} 月季节 ${document.getElementById('gj_season').value}\n`;
        md += `- **1. 强/弱**: ${document.getElementById('gj_strength').value}，局型：${document.getElementById('gj_type').value}\n`;
        md += `- **2. 根**: ${document.getElementById('gj_root').value}\n`;
        md += `- **3. 扶抑/从**: ${document.getElementById('gj_follow').value}局\n`;
        md += `- **画像**: ${document.getElementById('gj_portrait').value}\n`;
        md += `- **天赋本能**: ${document.getElementById('gj_talent').value}\n\n`;

        // 定寒燥
        md += `## 二、定寒燥\n`;
        md += `- **状态**: ${document.getElementById('hz_base').value}\n`;
        md += `- **调候药**: ${document.getElementById('hz_medicine').value} (有/无: ${document.getElementById('hz_exists').value})\n`;
        md += `- **意识**: 喜 [${document.getElementById('hz_like').value}], 不喜 [${document.getElementById('hz_dislike').value}]\n\n`;

        // 定病药
        md += `## 三、定病药\n`;
        md += `| 级别 | 五行 | 五识 | 有/无 | 旺/相 | 根有/无 | 强/弱 | 意识 |\n`;
        md += `| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n`;
        md += `| 君 | ${document.getElementById('by_jun_wx').value} | ${document.getElementById('by_jun_ws').value} | ${document.getElementById('by_jun_exists').value} | ${document.getElementById('by_jun_status').value} | ${document.getElementById('by_jun_root').value} | ${document.getElementById('by_jun_str').value} | ${document.getElementById('by_jun_mind').value} |\n`;
        md += `| 臣 | ${document.getElementById('by_chen_wx').value} | ${document.getElementById('by_chen_ws').value} | ${document.getElementById('by_chen_exists').value} | ${document.getElementById('by_chen_status').value} | ${document.getElementById('by_chen_root').value} | ${document.getElementById('by_chen_str').value} | ${document.getElementById('by_chen_mind').value} |\n`;
        md += `| 次 | ${document.getElementById('by_ci_wx').value} | ${document.getElementById('by_ci_ws').value} | ${document.getElementById('by_ci_exists').value} | ${document.getElementById('by_ci_status').value} | ${document.getElementById('by_ci_root').value} | ${document.getElementById('by_ci_str').value} | ${document.getElementById('by_ci_mind').value} |\n\n`;

        // 定流动
        md += `## 四、定流动\n`;
        md += `- **断点**: ${document.getElementById('ld_break').value}\n`;
        md += `- **暗旺是病/药**: ${document.getElementById('ld_hidden').value}\n`;
        md += `- **意识**: ${document.getElementById('ld_mind').value}\n\n`;

        // 看大运
        md += `## 五、看大运\n`;
        const dyInputs = document.querySelectorAll('#dayun_list .row-inputs');
        dyInputs.forEach((row, i) => {
            const inputs = row.querySelectorAll('input');
            if(inputs[0].value) {
                md += `- **${inputs[0].value}大运**: 失/平衡[${inputs[1].value}], 意识: ${inputs[2].value}\n`;
            }
        });
        md += `\n`;

        // 和我的异同
        md += `## 六、和我的异同\n`;
        md += `${document.getElementById('my_diff').value || '无'}\n`;

        // 导出文件
        const blob = new Blob([md], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${name}-${dateStr}.md`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
